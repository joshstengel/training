<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Baseball Training Plan</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0d0f14; --card: #151820; --card2: #1c202e; --border: #252b3f;
  --gold: #e2b93b; --blue: #4b9fe4; --red: #e05a47; --green: #43d97c;
  --text: #eaedf5; --muted: #6b7591; --r: 12px;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; min-height: 100vh; overflow-x: hidden; }
.hdr { background: linear-gradient(160deg,#0d0f14,#141929); border-bottom: 2px solid var(--gold); padding: 16px 16px 12px; position: sticky; top: 0; z-index: 50; }
.hdr-eye { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 2px; }
.hdr-title { font-size: 22px; font-weight: 800; color: var(--gold); letter-spacing: 1px; }
.tabs { display: flex; overflow-x: auto; background: var(--card); border-bottom: 1px solid var(--border); scrollbar-width: none; position: sticky; top: 62px; z-index: 40; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 11px 16px; font-size: 12px; font-weight: 600; color: var(--muted); border-bottom: 3px solid transparent; cursor: pointer; white-space: nowrap; user-select: none; }
.tab.on { color: var(--gold); border-bottom-color: var(--gold); }
.pg { display: none; padding: 12px 12px 80px; }
.pg.on { display: block; }
.focus { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--gold); border-radius: var(--r); padding: 11px 13px; margin-bottom: 10px; font-size: 12px; color: var(--muted); line-height: 1.5; }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.scard { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 12px; }
.slbl { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.sval { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }
.dcard { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 10px; }
.dtrig { display: flex; align-items: center; gap: 10px; padding: 13px 14px; cursor: pointer; user-select: none; }
.dbadge { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; flex-shrink: 0; }
.bg-gym { background: rgba(75,159,228,.15); color: var(--blue); border: 1px solid rgba(75,159,228,.3); }
.bg-home { background: rgba(67,217,124,.12); color: var(--green); border: 1px solid rgba(67,217,124,.25); }
.bg-proto { background: rgba(226,185,59,.12); color: var(--gold); border: 1px solid rgba(226,185,59,.25); }
.dtitle { flex: 1; font-size: 14px; font-weight: 700; line-height: 1.3; }
.darrow { color: var(--muted); font-size: 12px; transition: transform .2s; flex-shrink: 0; }
.dcard.op .darrow { transform: rotate(180deg); }
.dbody { display: none; border-top: 1px solid var(--border); background: var(--card2); }
.dcard.op .dbody { display: block; }
.shead { font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); padding: 11px 14px 4px; }
.xt { width: 100%; border-collapse: collapse; }
.xh { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 3px 14px 3px; text-align: right; }
.xh:first-child { text-align: left; }
.xr td { padding: 7px 14px; border-top: 1px solid rgba(37,43,63,.6); vertical-align: top; }
.xname { font-size: 13px; font-weight: 600; }
.xnote { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.35; }
.xsets { font-size: 12px; font-weight: 700; color: var(--blue); text-align: right; white-space: nowrap; }
.xreps { font-size: 12px; font-weight: 700; color: var(--gold); text-align: right; white-space: nowrap; }
.xrest { font-size: 11px; color: var(--muted); text-align: right; white-space: nowrap; }
.arm-banner { margin: 10px 14px 12px; background: rgba(224,90,71,.08); border: 1px solid rgba(224,90,71,.3); border-radius: 8px; padding: 10px 12px; }
.arm-title { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--red); margin-bottom: 3px; }
.arm-body { font-size: 12px; color: #e09080; line-height: 1.4; }
</style>
</head>
<body>

</div>

{h:"Rotational Finisher",rows:[{n:"Med ball side toss (hip drive)",s:"4",r:"5/side",x:"90s"},{n:"Rotational chop (cable or band)",s:"3",r:"10/side",x:"60s"}]}]}]},

{h:"Core",rows:[{n:"Dead bug",s:"2",r:"8/side",x:"60s"},{n:"Med ball rotational slam",s:"3",r:"5/side",x:"90s"}]}]},
{t:"Day B — Upper Power + Push",b:"gym",arm:1,sections:[
{h:"Warm-Up (8 min)",rows:[{n:"Jump rope",s:"1",r:"3 min",x:"—"},{n:"Band Y/T/W + pull-aparts",s:"2",r:"12 each",x:"—"},{n:"T-spine CARs",s:"1",r:"6/side",x:"—"}]},
{h:"Peak Power Block — Max Effort Every Rep",rows:[{n:"Clap push-up",s:"4",r:"4",x:"2 min",note:"Highest upper body explosion of the program"},{n:"Med ball rotational scoop toss",s:"5",r:"5/side",x:"2 min",note:"Peak phase — most power output of program"},{n:"Med ball overhead slam",s:"3",r:"5",x:"90s"}]},

{h:"Core",rows:[{n:"Weighted plank",s:"2",r:"40s",x:"60s"}]}]},

{h:"Strength Block",rows:[{n:"Bulgarian split squat (heaviest yet)",s:"4",r:"5/side",x:"2 min"},{n:"DB RDL",s:"3",r:"6",x:"2 min"},{n:"Push-up to DB row",s:"3",r:"8",x:"90s"},{n:"Face pull + external rotation",s:"3",r:"15",x:"60s"}]},

function tbl(rows){
  var h='<table class="xt"><tr><th class="xh" style="text-align:left">Exercise</th><th class="xh">Sets</th><th class="xh">Reps</th><th class="xh">Rest</th></tr>';
  rows.forEach(function(r){h+='<tr class="xr"><td><div class="xname">'+r.n+'</div>'+(r.note?'<div class="xnote">'+r.note+'</div>':'')+'</td><td class="xsets">'+r.s+'</td><td class="xreps">'+r.r+'</td><td class="xrest">'+r.x+'</td></tr>';});
  return h+'</table>';
}

var tabsEl=document.getElementById('tabs'),pagesEl=document.getElementById('pages');
D.forEach(function(ph,pi){
  var tb=document.createElement('div');
  tb.className='tab'+(pi===0?' on':'');
  tb.textContent=ph.tab;
  tb.onclick=function(){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
    document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});
    tb.classList.add('on');
    document.getElementById('p'+pi).classList.add('on');
  };
  tabsEl.appendChild(tb);

  var pg=document.createElement('div');
  pg.className='pg'+(pi===0?' on':'');
  pg.id='p'+pi;

  var html='<div class="focus">'+ph.focus+'</div>';
  html+='<div class="stats">';
  ph.stats.forEach(function(s){html+='<div class="scard"><div class="slbl">'+s.l+'</div><div class="sval">'+s.v+'</div></div>';});
  html+='</div>';

  ph.days.forEach(function(d,di){
    var id='c'+pi+'-'+di;
    var bc=d.b==='gym'?'bg-gym':d.b==='home'?'bg-home':'bg-proto';
    var bl=d.b==='gym'?'Gym':d.b==='home'?'Home':'Protocol';
    html+='<div class="dcard" id="'+id+'"><div class="dtrig" onclick="tog(\''+id+'\')"><span class="dbadge '+bc+'">'+bl+'</span><span class="dtitle">'+d.t+'</span><span class="darrow">&#9660;</span></div><div class="dbody">';
    d.sections.forEach(function(s){html+='<div class="shead">'+s.h+'</div>'+tbl(s.rows);});
    if(d.arm)html+='<div class="arm-banner"><div class="arm-title">Arm Care Required</div><div class="arm-body">Complete the full arm care routine after this session. See the Arm Care tab.</div></div>';
    html+='</div></div>';
  });

  pg.innerHTML=html;
  pagesEl.appendChild(pg);
});

function tog(id){document.getElementById(id).classList.toggle('op');}
</script>
</body>
</html>
